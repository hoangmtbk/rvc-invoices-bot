services:
  traefik:
    image: traefik:v3.6.14
    container_name: rvc-traefik
    restart: always
    environment:
      - DOCKER_API_VERSION=1.47
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - proxy

  rvc-invoices-bot:
    build: .
    container_name: rvc-invoices-bot
    restart: always
    env_file: .env
    volumes:
      - invoices_data:/app/data
      - invoices_logs:/app/logs
    depends_on:
      - rvc-minio
    networks:
      - proxy

  rvc-invoices-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: rvc-invoices-web
    restart: always
    env_file: .env
    volumes:
      - invoices_data:/app/data
    depends_on:
      - rvc-invoices-bot
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.web.rule=Host(`${DOMAIN_WEB}`)
      - traefik.http.routers.web.entrypoints=websecure
      - traefik.http.routers.web.tls.certresolver=letsencrypt
      - traefik.http.routers.web-redirect.rule=Host(`${DOMAIN_WEB}`)
      - traefik.http.routers.web-redirect.entrypoints=web
      - traefik.http.routers.web-redirect.middlewares=redirect-to-https
      - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
      - traefik.http.services.web.loadbalancer.server.port=8080

  rvc-minio:
    image: minio/minio
    container_name: rvc-minio
    restart: always
    command: server /data --console-address ":9001"
    env_file: .env
    volumes:
      - minio_data:/data
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.minio.rule=Host(`${DOMAIN_MINIO}`)
      - traefik.http.routers.minio.entrypoints=websecure
      - traefik.http.routers.minio.tls.certresolver=letsencrypt
      - traefik.http.routers.minio.service=minio
      - traefik.http.services.minio.loadbalancer.server.port=9000
      - traefik.http.routers.minio-console.rule=Host(`${DOMAIN_MINIO_CONSOLE}`)
      - traefik.http.routers.minio-console.entrypoints=websecure
      - traefik.http.routers.minio-console.tls.certresolver=letsencrypt
      - traefik.http.routers.minio-console.service=minio-console
      - traefik.http.services.minio-console.loadbalancer.server.port=9001

volumes:
  invoices_data:
  invoices_logs:
  minio_data:
  letsencrypt:

networks:
  proxy:
    external: false
